<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Onyxay Lanzarote Producciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07070e;
      --surface:      #0f0f18;
      --surface2:     #15151f;
      --surface3:     #1c1c28;
      --border:       rgba(255,255,255,0.07);
      --border-light: rgba(255,255,255,0.13);
      --accent:       #2041c8;
      --accent-light: #4062e8;
      --accent-glow:  rgba(32,65,200,0.12);
      --star:         #d4a843;
      --star-dim:     rgba(212,168,67,0.25);
      --text:         #f0f0f4;
      --muted:        rgba(240,240,244,0.45);
      --muted2:       rgba(240,240,244,0.22);
      --danger:       #c84040;
      --success:      #3ecf8e;
      --ease:         cubic-bezier(0.4,0,0.2,1);
      --display:      'Cormorant Garamond', serif;
      --sans:         'Montserrat', sans-serif;
      --nav-h:        68px;
    }

    html, body { height:100%; font-family:var(--sans); background:var(--bg); color:var(--text); font-size:14px; line-height:1.6; font-weight:300; -webkit-font-smoothing:antialiased; }
    a  { color:inherit; text-decoration:none; }
    ul { list-style:none; }
    button, input, select { font-family:var(--sans); }
    button { cursor:pointer; }

    /* ══════════════════════════════════════
       LOGIN
    ══════════════════════════════════════ */
    #login-screen {
      display:flex; align-items:center; justify-content:center; min-height:100vh;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(32,65,200,0.2) 0%, transparent 60%), var(--bg);
    }
    .login-wrap { width:100%; max-width:420px; padding:0 1.5rem; }
    .login-card {
      background: rgba(15,15,24,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-light);
      padding: 3.5rem 3rem;
    }
    .login-eyebrow { font-size:.6rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--accent-light); display:block; margin-bottom:.6rem; }
    .login-logo { font-family:var(--display); font-size:1.7rem; font-weight:600; color:var(--text); line-height:1.1; margin-bottom:2.4rem; }
    .login-logo span { color:#c8d8ff; }
    .login-divider { width:36px; height:1px; background:var(--accent); margin-bottom:2.4rem; }
    .login-label { display:block; font-size:.6rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    .login-input {
      width:100%; background:transparent; border:none;
      border-bottom:1px solid rgba(255,255,255,0.15);
      color:var(--text); padding:10px 0; font-size:.9rem; font-weight:300;
      outline:none; transition:border-color .3s var(--ease); margin-bottom:2.4rem; letter-spacing:.06em;
    }
    .login-input:focus { border-bottom-color:var(--accent-light); }
    .login-btn {
      width:100%; background:var(--accent); border:1px solid var(--accent); color:#fff;
      padding:14px; font-size:.65rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
      transition:background .3s var(--ease), border-color .3s;
    }
    .login-btn:hover { background:var(--accent-light); border-color:var(--accent-light); }
    .login-btn:disabled { opacity:.5; cursor:default; }
    .login-error { font-size:.75rem; color:var(--danger); margin-top:1rem; min-height:1.2em; }

    /* ══════════════════════════════════════
       SHELL
    ══════════════════════════════════════ */
    #dashboard { display:none; flex-direction:column; min-height:100vh; }

    .admin-nav {
      position:fixed; top:0; left:0; right:0; height:var(--nav-h); z-index:200;
      display:flex; align-items:center; justify-content:space-between; padding:0 5%;
      background:rgba(7,7,14,0.94); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px);
      border-bottom:1px solid var(--border); box-shadow:0 1px 32px rgba(0,0,0,0.4);
    }
    .admin-nav__logo { font-family:var(--display); font-size:1.3rem; font-weight:600; letter-spacing:.04em; }
    .admin-nav__logo span { color:#c8d8ff; }
    .admin-nav__right { display:flex; align-items:center; gap:1.6rem; }
    .admin-nav__badge { font-size:.56rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--accent-light); border:1px solid rgba(64,98,232,.35); padding:4px 10px; }
    .admin-nav__logout {
      font-size:.6rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase;
      color:var(--muted); background:none; border:1px solid var(--border); padding:7px 16px;
      transition:all .3s var(--ease);
    }
    .admin-nav__logout:hover { color:var(--text); border-color:var(--border-light); }

    .admin-main {
      flex:1; margin-top:var(--nav-h);
      padding:3.5rem 5%; max-width:1400px; width:100%; margin-left:auto; margin-right:auto;
    }

    /* Page title */
    .admin-page-title { margin-bottom:2.8rem; padding-bottom:2rem; border-bottom:1px solid var(--border); }
    .admin-page-title .eyebrow { font-size:.6rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase; color:var(--accent-light); display:block; margin-bottom:.6rem; }
    .admin-page-title h1 { font-family:var(--display); font-size:clamp(1.8rem,3.5vw,2.8rem); font-weight:300; color:var(--text); }
    .admin-page-title h1 em { font-style:italic; color:#c8d8ff; }

    /* Stats */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border:1px solid var(--border); margin-bottom:3rem; }
    .stat-card { background:var(--surface); padding:2rem 2.2rem; position:relative; overflow:hidden; transition:background .3s; }
    .stat-card::before { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--accent); opacity:0; transition:opacity .3s; }
    .stat-card:hover { background:var(--surface2); }
    .stat-card:hover::before { opacity:1; }
    .stat-card--star::before { background:var(--star); }
    .stat-card__label { font-size:.58rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:.7rem; display:block; }
    .stat-card__num { font-family:var(--display); font-size:clamp(2.2rem,3.5vw,3.2rem); font-weight:300; color:var(--accent-light); line-height:1; }
    .stat-card--star .stat-card__num { color:var(--star); }

    /* Tabs */
    .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:1.8rem; }
    .tab {
      background:none; border:none; border-bottom:2px solid transparent;
      color:var(--muted); padding:10px 20px; font-size:.62rem; font-weight:600;
      letter-spacing:.16em; text-transform:uppercase;
      transition:all .25s var(--ease); margin-bottom:-1px;
    }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--text); border-bottom-color:var(--accent); }
    .tab.tab--star.active { color:var(--star); border-bottom-color:var(--star); }

    /* Controls */
    .controls-bar { display:flex; align-items:center; gap:1rem; margin-bottom:1.2rem; flex-wrap:wrap; }
    .ctrl-search {
      flex:1; min-width:200px; background:transparent; border:none;
      border-bottom:1px solid rgba(255,255,255,0.12); color:var(--text);
      padding:9px 0; font-size:.8rem; font-weight:300; outline:none;
      transition:border-color .3s; letter-spacing:.04em;
    }
    .ctrl-search::placeholder { color:var(--muted2); }
    .ctrl-search:focus { border-bottom-color:var(--accent-light); }
    .ctrl-select {
      background:var(--surface); border:1px solid var(--border); color:var(--muted);
      padding:8px 12px; font-size:.62rem; font-weight:500; letter-spacing:.1em;
      text-transform:uppercase; outline:none; transition:border-color .3s;
    }
    .ctrl-select:focus { border-color:var(--accent); color:var(--text); }
    .ctrl-btn {
      background:transparent; border:1px solid var(--border); color:var(--muted);
      padding:8px 18px; font-size:.6rem; font-weight:600; letter-spacing:.16em;
      text-transform:uppercase; transition:all .3s var(--ease); white-space:nowrap;
    }
    .ctrl-btn:hover { border-color:var(--border-light); color:var(--text); }
    .ctrl-btn--accent { background:var(--accent); border-color:var(--accent); color:#fff; }
    .ctrl-btn--accent:hover { background:var(--accent-light); border-color:var(--accent-light); }

    /* Meta */
    .leads-meta { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
    .leads-meta__count { font-size:.6rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); }

    /* Table */
    .table-wrap { border:1px solid var(--border); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:.78rem; }
    thead th {
      background:var(--surface); padding:13px 16px; text-align:left;
      font-size:.56rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
      color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap;
    }
    tbody tr { border-bottom:1px solid var(--border); transition:background .2s var(--ease); cursor:pointer; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--surface2); }
    tbody tr.is-expanded { background:var(--surface2); }
    tbody tr.is-starred { background:rgba(212,168,67,0.04); }
    tbody tr.is-starred:hover { background:rgba(212,168,67,0.08); }
    tbody td { padding:14px 16px; vertical-align:middle; }

    .td-id   { font-size:.6rem; color:var(--muted2); font-weight:500; letter-spacing:.1em; white-space:nowrap; }
    .td-date { font-size:.68rem; color:var(--muted); white-space:nowrap; }
    .td-name { font-weight:500; color:var(--text); white-space:nowrap; }
    .td-email { color:var(--accent-light); font-size:.74rem; }
    .td-phone { color:var(--muted); white-space:nowrap; font-size:.74rem; }
    .td-tag { display:inline-block; font-size:.54rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; padding:3px 9px; border:1px solid rgba(64,98,232,.3); color:var(--accent-light); }
    .td-msg { max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); font-size:.72rem; }

    /* Star button */
    .btn-star {
      background:none; border:none; font-size:1rem; line-height:1;
      color:var(--muted2); padding:4px 6px; transition:all .2s var(--ease);
    }
    .btn-star:hover { color:var(--star); transform:scale(1.2); }
    .btn-star.is-starred { color:var(--star); }

    /* Archive button */
    .btn-archive {
      background:none; border:1px solid rgba(200,64,64,.18); color:rgba(200,64,64,.5);
      padding:5px 11px; font-size:.56rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; transition:all .25s;
    }
    .btn-archive:hover { background:rgba(200,64,64,.08); border-color:var(--danger); color:var(--danger); }

    /* Restore button */
    .btn-restore {
      background:none; border:1px solid rgba(62,207,142,.25); color:rgba(62,207,142,.6);
      padding:5px 11px; font-size:.56rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; transition:all .25s;
    }
    .btn-restore:hover { background:rgba(62,207,142,.08); border-color:var(--success); color:var(--success); }

    /* Expanded detail */
    .detail-row td { padding:0; background:var(--surface2); border-bottom:1px solid var(--border); }
    .detail-inner {
      padding:2rem 2.4rem;
      display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:1.5rem 2.2rem;
      border-top:2px solid var(--accent);
    }
    .detail-inner.detail-inner--starred { border-top-color:var(--star); }
    .detail-field label { display:block; font-size:.56rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
    .detail-field p { font-size:.8rem; font-weight:300; color:var(--text); word-break:break-word; line-height:1.7; }
    .detail-field p a { color:var(--accent-light); }
    .detail-field--wide { grid-column:1 / -1; }

    /* State blocks */
    .state-block { padding:5rem 2rem; text-align:center; }
    .state-block__title { font-family:var(--display); font-size:2rem; font-weight:300; color:var(--text); margin-bottom:.5rem; }
    .state-block__sub { font-size:.76rem; color:var(--muted); }

    /* Archive banner */
    .archive-banner {
      background:rgba(200,64,64,.06);
      border:1px solid rgba(200,64,64,.18);
      padding:1.2rem 1.8rem;
      margin-bottom:1.8rem;
      font-size:.76rem;
      color:rgba(200,64,64,.8);
      letter-spacing:.03em;
      display:flex;
      align-items:center;
      gap:.8rem;
    }

    @media (max-width:768px) {
      .stats-row { grid-template-columns:1fr 1fr; }
      .admin-main { padding:2rem 5%; }
      .detail-inner { grid-template-columns:1fr; }
      .admin-nav__badge { display:none; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-card">
      <span class="login-eyebrow">Panel de administración</span>
      <div class="login-logo">Onyxay <span>Lanzarote</span> Producciones</div>
      <div class="login-divider"></div>
      <label class="login-label" for="pwd">Contraseña</label>
      <input class="login-input" type="password" id="pwd" placeholder="••••••••" autocomplete="current-password" />
      <button class="login-btn" id="login-btn">Acceder</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <nav class="admin-nav">
    <div class="admin-nav__logo">Onyxay <span>Lanzarote</span> Producciones</div>
    <div class="admin-nav__right">
      <span class="admin-nav__badge">Admin</span>
      <button class="admin-nav__logout" id="logout-btn">Cerrar sesión</button>
    </div>
  </nav>

  <main class="admin-main">

    <div class="admin-page-title">
      <span class="eyebrow">Gestión de candidatos</span>
      <h1>Base de datos <em>de contactos</em></h1>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-card__label">Total activos</span>
        <div class="stat-card__num" id="stat-total">—</div>
      </div>
      <div class="stat-card stat-card--star">
        <span class="stat-card__label">★ Destacados</span>
        <div class="stat-card__num" id="stat-starred">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-card__label">Recibidos hoy</span>
        <div class="stat-card__num" id="stat-today">—</div>
      </div>
      <div class="stat-card">
        <span class="stat-card__label">Esta semana</span>
        <div class="stat-card__num" id="stat-week">—</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="all">Todos</button>
      <button class="tab tab--star" data-tab="starred">★ &nbsp;Destacados</button>
      <button class="tab" data-tab="archived">Archivados</button>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
      <input class="ctrl-search" type="text" id="search" placeholder="Buscar por nombre, email, teléfono, perfil…" />
      <select class="ctrl-select" id="filter-tipo">
        <option value="">Todos los tipos</option>
        <option value="candidatura">Candidatura</option>
        <option value="contacto">Contacto</option>
      </select>
      <button class="ctrl-btn" id="refresh-btn">↻ &nbsp;Actualizar</button>
      <button class="ctrl-btn ctrl-btn--accent" id="export-btn">↓ &nbsp;Exportar CSV</button>
    </div>

    <div class="leads-meta">
      <span class="leads-meta__count" id="leads-count"></span>
    </div>

    <div class="table-wrap" id="table-wrap">
      <div class="state-block">
        <div class="state-block__title">Cargando</div>
        <div class="state-block__sub">Obteniendo registros…</div>
      </div>
    </div>

  </main>
</div>

<script>
  const TOKEN_KEY = 'lp_admin_token';
  let activeLeads   = [];
  let archivedLeads = [];
  let expandedId    = null;
  let currentTab    = 'all';   // 'all' | 'starred' | 'archived'

  const getToken   = () => sessionStorage.getItem(TOKEN_KEY);
  const setToken   = t  => sessionStorage.setItem(TOKEN_KEY, t);
  const clearToken = () => sessionStorage.removeItem(TOKEN_KEY);
  const authHeader = () => ({ 'Authorization': 'Bearer ' + getToken() });

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    loadLeads();
  }
  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    clearToken();
  }
  if (getToken()) showDashboard();

  /* ── Login ─────────────────────────────── */
  async function doLogin() {
    const pwd = document.getElementById('pwd').value;
    const err = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    if (!pwd) { err.textContent = 'Introduce tu contraseña'; return; }
    btn.textContent = 'Accediendo…'; btn.disabled = true;
    try {
      const res  = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
      const json = await res.json();
      if (res.ok) { setToken(json.token); err.textContent = ''; showDashboard(); }
      else { err.textContent = json.error || 'Contraseña incorrecta'; }
    } catch { err.textContent = 'Error de conexión. Inténtalo de nuevo.'; }
    btn.textContent = 'Acceder'; btn.disabled = false;
  }
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('pwd').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  document.getElementById('logout-btn').addEventListener('click', showLogin);

  /* ── Load ──────────────────────────────── */
  async function loadLeads() {
    try {
      const res = await fetch('/api/admin/leads', { headers: authHeader() });
      if (res.status === 401) { showLogin(); return; }
      const json = await res.json();
      activeLeads   = json.leads;
      archivedLeads = json.archived || [];
      document.getElementById('stat-total').textContent   = json.stats.total;
      document.getElementById('stat-starred').textContent = json.stats.starred;
      document.getElementById('stat-today').textContent   = json.stats.today;
      document.getElementById('stat-week').textContent    = json.stats.thisWeek;
      renderTable();
    } catch {
      document.getElementById('table-wrap').innerHTML =
        '<div class="state-block"><div class="state-block__title">Error</div><div class="state-block__sub">No se pudieron cargar los registros.</div></div>';
    }
  }

  /* ── Tabs ──────────────────────────────── */
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      expandedId = null;
      renderTable();
    });
  });

  /* ── Filter ────────────────────────────── */
  function filteredLeads() {
    const q    = (document.getElementById('search').value || '').toLowerCase().trim();
    const tipo = document.getElementById('filter-tipo').value;
    let pool   = currentTab === 'archived' ? archivedLeads : activeLeads;
    if (currentTab === 'starred') pool = pool.filter(l => l.starred);
    return pool.filter(l => {
      const matchQ = !q
        || (l.nombre   || '').toLowerCase().includes(q)
        || (l.email    || '').toLowerCase().includes(q)
        || (l.telefono || '').toLowerCase().includes(q)
        || (l.perfil   || '').toLowerCase().includes(q)
        || (l.mensaje  || '').toLowerCase().includes(q);
      return matchQ && (!tipo || l.tipo === tipo);
    });
  }

  document.getElementById('search').addEventListener('input', renderTable);
  document.getElementById('filter-tipo').addEventListener('change', renderTable);
  document.getElementById('refresh-btn').addEventListener('click', loadLeads);

  /* ── Render ────────────────────────────── */
  function renderTable() {
    const leads  = filteredLeads();
    const wrap   = document.getElementById('table-wrap');
    const isArch = currentTab === 'archived';

    document.getElementById('leads-count').textContent = (() => {
      const pool = isArch ? archivedLeads : (currentTab === 'starred' ? activeLeads.filter(l=>l.starred) : activeLeads);
      return leads.length === pool.length
        ? `${leads.length} registro${leads.length!==1?'s':''}`
        : `${leads.length} de ${pool.length} registros`;
    })();

    if (!leads.length) {
      const msgs = { all:'No hay candidatos activos', starred:'No hay candidatos destacados aún', archived:'El historial está vacío' };
      const subs = { all:'Los candidatos nuevos aparecerán aquí.', starred:'Pulsa ☆ en cualquier candidato para destacarlo.', archived:'Los candidatos archivados se guardan aquí para siempre.' };
      wrap.innerHTML = `<div class="state-block"><div class="state-block__title">${msgs[currentTab]}</div><div class="state-block__sub">${subs[currentTab]}</div></div>`;
      return;
    }

    const actionCol = isArch
      ? '<th>Acción</th>'
      : '<th>★</th><th>Acción</th>';

    let html = `
      <table>
        <thead><tr>
          <th>#</th><th>Fecha</th><th>Nombre</th><th>Email</th>
          <th>Teléfono</th><th>Perfil</th><th>Mensaje</th>${actionCol}
        </tr></thead>
        <tbody>`;

    leads.forEach(l => {
      const date   = l.createdAt ? fmt(l.createdAt) : '—';
      const msg    = (l.mensaje || '').slice(0,50) + ((l.mensaje||'').length>50?'…':'');
      const isExp  = expandedId === l.id;
      const rowCls = [isExp?'is-expanded':'', l.starred&&!isArch?'is-starred':''].filter(Boolean).join(' ');

      const starBtn = isArch ? '' : `
        <td onclick="event.stopPropagation()">
          <button class="btn-star${l.starred?' is-starred':''}" onclick="toggleStar(${l.id})" title="${l.starred?'Quitar destacado':'Destacar'}">
            ${l.starred ? '★' : '☆'}
          </button>
        </td>`;

      const actionBtn = isArch
        ? `<td onclick="event.stopPropagation()"><button class="btn-restore" onclick="restoreLead(${l.id})">Restaurar</button></td>`
        : `<td onclick="event.stopPropagation()"><button class="btn-archive" onclick="archiveLead(${l.id})">Archivar</button></td>`;

      html += `
        <tr class="${rowCls}" onclick="toggleRow(${l.id})">
          <td class="td-id">${String(l.id).padStart(3,'0')}</td>
          <td class="td-date">${date}</td>
          <td class="td-name">${esc(l.nombre)}</td>
          <td class="td-email">${esc(l.email)}</td>
          <td class="td-phone">${esc(l.telefono)||'<span style="color:var(--muted2)">—</span>'}</td>
          <td>${l.perfil?`<span class="td-tag">${esc(l.perfil)}</span>`:'<span style="color:var(--muted2)">—</span>'}</td>
          <td class="td-msg">${esc(msg)||'<span style="color:var(--muted2)">—</span>'}</td>
          ${starBtn}${actionBtn}
        </tr>`;

      if (isExp) {
        html += `
        <tr class="detail-row">
          <td colspan="${isArch?8:9}">
            <div class="detail-inner${l.starred?' detail-inner--starred':''}">
              <div class="detail-field"><label>Nombre</label><p>${esc(l.nombre)}</p></div>
              <div class="detail-field"><label>Email</label><p><a href="mailto:${esc(l.email)}">${esc(l.email)}</a></p></div>
              <div class="detail-field"><label>Teléfono</label><p>${esc(l.telefono)||'—'}</p></div>
              <div class="detail-field"><label>Perfil</label><p>${esc(l.perfil)||'—'}</p></div>
              <div class="detail-field"><label>Portfolio</label><p>${l.portfolio?`<a href="${esc(l.portfolio)}" target="_blank" rel="noopener">${esc(l.portfolio)}</a>`:'—'}</p></div>
              <div class="detail-field"><label>Fecha</label><p>${date}</p></div>
              ${l.archivedAt?`<div class="detail-field"><label>Archivado</label><p>${fmt(l.archivedAt)}</p></div>`:''}
              <div class="detail-field detail-field--wide"><label>Mensaje</label><p style="white-space:pre-wrap;">${esc(l.mensaje)||'—'}</p></div>
            </div>
          </td>
        </tr>`;
      }
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  function toggleRow(id) {
    expandedId = expandedId === id ? null : id;
    renderTable();
  }

  /* ── Star ──────────────────────────────── */
  async function toggleStar(id) {
    try {
      const res = await fetch(`/api/admin/leads/${id}/star`, { method:'PUT', headers: authHeader() });
      if (res.status === 401) { showLogin(); return; }
      const json = await res.json();
      const lead = activeLeads.find(l => l.id === id);
      if (lead) lead.starred = json.starred;
      const starredCount = activeLeads.filter(l => l.starred).length;
      document.getElementById('stat-starred').textContent = starredCount;
      renderTable();
    } catch { alert('Error al actualizar el destacado.'); }
  }

  /* ── Archive ───────────────────────────── */
  async function archiveLead(id) {
    if (!confirm('¿Archivar este candidato? Podrás restaurarlo desde la pestaña Archivados.')) return;
    try {
      const res = await fetch(`/api/admin/leads/${id}`, { method:'DELETE', headers: authHeader() });
      if (res.status === 401) { showLogin(); return; }
      if (res.ok) {
        const lead = activeLeads.find(l => l.id === id);
        if (lead) {
          lead.archived = true;
          lead.archivedAt = new Date().toISOString();
          archivedLeads.unshift(lead);
          activeLeads = activeLeads.filter(l => l.id !== id);
        }
        if (expandedId === id) expandedId = null;
        document.getElementById('stat-total').textContent   = activeLeads.length;
        document.getElementById('stat-starred').textContent = activeLeads.filter(l=>l.starred).length;
        renderTable();
      }
    } catch { alert('Error al archivar el registro.'); }
  }

  /* ── Restore ───────────────────────────── */
  async function restoreLead(id) {
    try {
      const res = await fetch(`/api/admin/leads/${id}/restore`, { method:'PUT', headers: authHeader() });
      if (res.status === 401) { showLogin(); return; }
      if (res.ok) {
        const lead = archivedLeads.find(l => l.id === id);
        if (lead) {
          lead.archived = false;
          lead.archivedAt = null;
          activeLeads.unshift(lead);
          archivedLeads = archivedLeads.filter(l => l.id !== id);
        }
        if (expandedId === id) expandedId = null;
        document.getElementById('stat-total').textContent   = activeLeads.length;
        document.getElementById('stat-starred').textContent = activeLeads.filter(l=>l.starred).length;
        renderTable();
      }
    } catch { alert('Error al restaurar el registro.'); }
  }

  /* ── Export CSV ────────────────────────── */
  document.getElementById('export-btn').addEventListener('click', () => {
    const leads = filteredLeads();
    if (!leads.length) { alert('No hay registros para exportar.'); return; }
    const cols = ['id','createdAt','tipo','nombre','email','telefono','perfil','portfolio','mensaje','starred'];
    const csv  = [cols.join(','), ...leads.map(l => cols.map(c=>`"${String(l[c]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'})),
      download: `leads_${new Date().toISOString().slice(0,10)}.csv`
    });
    a.click();
  });

  /* ── Util ──────────────────────────────── */
  function fmt(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})
      + ' · ' + d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
